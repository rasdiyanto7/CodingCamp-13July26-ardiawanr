<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Dashboard</title>

    <!-- Theme-flash prevention: reads localStorage before first paint -->
    <script>
      (function () {
        var t = localStorage.getItem('dashboard-theme');
        document.documentElement.className = t === 'dark' ? 'dark' : 'light';
      }());
    </script>

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <header>
      <button id="theme-toggle" type="button" aria-label="Switch to dark mode">
        <span id="theme-icon" aria-hidden="true">
          <!-- Sun icon (shown in light mode) -->
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"
               role="img" aria-label="Sun — light mode active">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1"  x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22"  x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1"  y1="12" x2="3"  y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </span>
      </button>
    </header>

    <main>
      <section id="greeting-widget" aria-label="Greeting">
        <p id="greeting-text"></p>
        <p id="date-display"></p>
        <p id="time-display"></p>
        <div class="greeting-name-row">
          <label for="name-input" class="sr-only">Your name</label>
          <input
            id="name-input"
            type="text"
            maxlength="50"
            placeholder="Enter your name"
            aria-label="Your name"
          />
          <button id="name-save-btn" type="button">Save</button>
        </div>
      </section>

      <section id="timer-widget" aria-label="Focus Timer">
        <h2>Focus Timer</h2>
        <p id="timer-display" aria-live="polite" aria-label="Timer display">25:00</p>
        <div class="timer-controls">
          <button id="timer-start" type="button">Start</button>
          <button id="timer-stop"  type="button" disabled>Stop</button>
          <button id="timer-reset" type="button">Reset</button>
        </div>
        <p id="timer-alert" role="alert" hidden></p>
      </section>

      <section id="task-widget" aria-label="Task List">
        <!-- Task List widget populated by js/app.js -->
      </section>

      <section id="links-widget" aria-label="Quick Links">
        <!-- Quick Links widget populated by js/app.js -->
      </section>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
